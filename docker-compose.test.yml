services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - MASSIVE_API_KEY=
      - DB_PATH=/tmp/test.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:8000
    working_dir: /work
    volumes:
      - ./test:/work
    command: sh -c "npm install --no-fund --no-audit --silent && npx playwright test"
